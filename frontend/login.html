<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP TAXI - ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #008f75;
      --green-dark: #006d5b;
      --ink: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --panel: rgba(255, 255, 255, 0.94);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #f8fafc;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .login-screen {
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.94) 0%, rgba(255, 255, 255, 0.52) 54%, rgba(255, 255, 255, 0.98) 72%),
        url("https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1600&q=80") center / cover;
    }

    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 40px;
      padding: 6px 14px 6px 8px;
      color: var(--green);
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
      background: #fff;
    }

    .brand-icon,
    .form-logo {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      color: #fff;
      background: var(--green);
      border-radius: 50%;
      font-size: 15px;
      line-height: 1;
    }

    .header-actions {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      font-size: 13px;
      font-weight: 800;
    }

    .header-actions a {
      color: #334155;
      text-decoration: none;
    }

    .login-layout {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 430px;
      align-items: center;
      gap: 52px;
      min-height: calc(100vh - 64px);
      padding: 24px 64px 48px;
    }

    .intro {
      max-width: 760px;
    }

    .eyebrow {
      color: var(--green);
      font-size: 18px;
      font-weight: 700;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      max-width: 660px;
      margin-top: 18px;
      font-size: 46px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .intro p {
      max-width: 510px;
      margin-top: 16px;
      color: #334155;
      font-size: 15px;
      line-height: 1.8;
    }

    .benefits {
      display: grid;
      gap: 14px;
      max-width: 430px;
      margin-top: 28px;
    }

    .benefits article {
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .benefits h2 {
      font-size: 14px;
      font-weight: 800;
    }

    .benefits p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      justify-self: center;
      padding: 28px;
      background: var(--panel);
      border: 1px solid #eef2f7;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }

    .form-logo {
      width: 60px;
      height: 60px;
      margin: -4px auto 14px;
      font-size: 26px;
    }

    .form-heading {
      text-align: center;
    }

    .form-heading h2 {
      font-size: 26px;
      font-weight: 800;
    }

    .form-heading p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    label {
      display: grid;
      gap: 7px;
    }

    label span {
      font-size: 13px;
      font-weight: 800;
    }

    input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      color: #1f2937;
      font-size: 14px;
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 11px;
      outline: none;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0, 143, 117, 0.16);
    }

    .password-field {
      position: relative;
    }

    .password-field input {
      padding-right: 54px;
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 8px;
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      color: #475467;
      font-size: 15px;
      background: #f1f5f9;
      border: 0;
      border-radius: 8px;
      transform: translateY(-50%);
    }

    .password-toggle:hover {
      color: var(--green);
      background: #ecfdf5;
    }

    .field-error {
      min-height: 16px;
      color: #dc2626;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    input.input-error {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
    }

    .form-status {
      display: none;
      padding: 11px 12px;
      color: #065f46;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 10px;
    }

    .form-status.show {
      display: block;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .remember {
      display: inline-flex;
      grid-template-columns: none;
      align-items: center;
      gap: 8px;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: var(--green);
    }

    .form-row a,
    .form-row button,
    .register-note a {
      color: var(--green);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
    }

    .forgot-button {
      padding: 0;
      background: transparent;
      border: 0;
    }

    .submit-button {
      width: 100%;
      height: 50px;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      background: var(--green);
      border: 0;
      border-radius: 12px;
      box-shadow: 0 12px 24px rgba(0, 143, 117, 0.24);
    }

    .submit-button:hover {
      background: var(--green-dark);
    }

    .register-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.42);
    }

    .modal-backdrop.open {
      display: grid;
    }

    .forgot-modal {
      width: min(100%, 430px);
      padding: 24px;
      background: #fff;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.28);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .modal-header h2 {
      font-size: 21px;
      font-weight: 800;
    }

    .modal-close {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      color: #64748b;
      font-size: 22px;
      background: #f1f5f9;
      border: 0;
      border-radius: 9px;
    }

    .modal-copy {
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
    }

    .secondary-button {
      width: 100%;
      height: 50px;
      color: #475467;
      font-size: 15px;
      font-weight: 800;
      background: #eef2f7;
      border: 0;
      border-radius: 12px;
    }

    @media (max-width: 900px) {
      .login-layout {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 10px 20px 36px;
      }

      .intro,
      .benefits {
        max-width: none;
      }

      .login-card {
        max-width: 460px;
      }
    }

    @media (max-width: 430px) {
      .topbar {
        padding: 0 20px;
      }

      .header-actions {
        display: none;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <main class="login-screen">
    <header class="topbar">
      <a class="brand" href="login.html" aria-label="JP TAXI">
        <span class="brand-icon">🚕</span>
        <span>JP TAXI</span>
      </a>
      <nav class="header-actions" aria-label="グローバルメニュー">
        <a href="register.html">新規登録</a>
        <a href="bill_confirm.html">予約確認</a>
      </nav>
    </header>

    <section class="login-layout">
      <div class="intro">
        <span class="eyebrow">🚕 日本語対応タクシーサービス</span>
        <h1>安心してJP TAXIにログイン</h1>
        <p>日本語でタクシーを予約し、移動履歴、メッセージ、アカウント情報をまとめて管理できます。</p>

        <div class="benefits" aria-label="サービスの特徴">
          <article>
            <h2>簡単予約</h2>
            <p>目的地の検索から配車確認まで、ひとつの画面フローで進められます。</p>
          </article>
          <article>
            <h2>安全な連絡</h2>
            <p>アプリ内の情報でドライバーとの連絡や乗車内容を確認できます。</p>
          </article>
        </div>
      </div>

      <section class="login-card" aria-labelledby="login-title">
        <div class="form-logo" aria-hidden="true">🚕</div>
        <div class="form-heading">
          <h2 id="login-title">ログイン</h2>
          <p>メールアドレスとパスワードを入力してください。</p>
        </div>

        <form id="loginForm" novalidate>
          <label>
            <span>メールアドレス</span>
            <input id="emailInput" type="email" placeholder="example@email.com" autocomplete="email" aria-describedby="emailError">
            <span class="field-error" id="emailError" aria-live="polite"></span>
          </label>

          <label>
            <span>パスワード</span>
            <span class="password-field">
              <input id="passwordInput" type="password" placeholder="パスワードを入力" autocomplete="current-password" aria-describedby="passwordError">
              <button class="password-toggle" id="passwordToggle" type="button" aria-label="パスワードを表示" aria-pressed="false">👁</button>
            </span>
            <span class="field-error" id="passwordError" aria-live="polite"></span>
          </label>

          <div class="form-row">
            <label class="remember">
              <input type="checkbox">
              <span>ログイン状態を保持</span>
            </label>
            <button class="forgot-button" id="forgotPasswordButton" type="button">パスワードを忘れた場合</button>
          </div>

          <div class="form-status" id="formStatus" role="status" aria-live="polite"></div>

          <button class="submit-button" type="submit">ログインする</button>
          <p class="register-note">アカウントをお持ちでないですか？ <a href="register.html">顧客登録</a></p>
        </form>
      </section>
    </section>
  </main>

  <div class="modal-backdrop" id="forgotModal" aria-hidden="true">
    <section class="forgot-modal" role="dialog" aria-modal="true" aria-labelledby="forgot-title">
      <div class="modal-header">
        <h2 id="forgot-title">パスワード再設定</h2>
        <button class="modal-close" type="button" data-forgot-close aria-label="閉じる">×</button>
      </div>
      <p class="modal-copy">登録済みのメールアドレスを入力してください。該当するアカウントがある場合、再設定手順を送信します。</p>

      <form id="forgotForm" novalidate>
        <label>
          <span>メールアドレス</span>
          <input id="forgotEmailInput" type="email" placeholder="example@email.com" autocomplete="email" aria-describedby="forgotEmailError">
          <span class="field-error" id="forgotEmailError" aria-live="polite"></span>
        </label>

        <div class="form-status" id="forgotStatus" role="status" aria-live="polite"></div>

        <div class="modal-actions">
          <button class="secondary-button" type="button" data-forgot-close>戻る</button>
          <button class="submit-button" type="submit">送信する</button>
        </div>
      </form>
    </section>
  </div>

  <script src="js/api-config.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const passwordToggle = document.getElementById('passwordToggle');
    const forgotPasswordButton = document.getElementById('forgotPasswordButton');
    const forgotModal = document.getElementById('forgotModal');
    const forgotForm = document.getElementById('forgotForm');
    const forgotEmailInput = document.getElementById('forgotEmailInput');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const forgotEmailError = document.getElementById('forgotEmailError');
    const formStatus = document.getElementById('formStatus');
    const forgotStatus = document.getElementById('forgotStatus');
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function setFieldError(input, errorNode, message) {
      errorNode.textContent = message;
      input.classList.toggle('input-error', Boolean(message));
      input.setAttribute('aria-invalid', String(Boolean(message)));
    }

    function validateEmail() {
      const email = emailInput.value.trim();

      if (!email) {
        setFieldError(emailInput, emailError, 'メールアドレスを入力してください。');
        return false;
      }

      if (!emailPattern.test(email)) {
        setFieldError(emailInput, emailError, '正しいメールアドレス形式で入力してください。');
        return false;
      }

      setFieldError(emailInput, emailError, '');
      return true;
    }

    function validateForgotEmail() {
      const email = forgotEmailInput.value.trim();

      if (!email) {
        setFieldError(forgotEmailInput, forgotEmailError, 'メールアドレスを入力してください。');
        return false;
      }

      if (!emailPattern.test(email)) {
        setFieldError(forgotEmailInput, forgotEmailError, '正しいメールアドレス形式で入力してください。');
        return false;
      }

      setFieldError(forgotEmailInput, forgotEmailError, '');
      return true;
    }

    function openForgotModal() {
      const currentEmail = emailInput.value.trim();
      forgotEmailInput.value = currentEmail;
      setFieldError(forgotEmailInput, forgotEmailError, '');
      forgotStatus.classList.remove('show');
      forgotStatus.textContent = '';
      forgotModal.classList.add('open');
      forgotModal.setAttribute('aria-hidden', 'false');
      window.setTimeout(() => forgotEmailInput.focus(), 80);
    }

    function closeForgotModal() {
      forgotModal.classList.remove('open');
      forgotModal.setAttribute('aria-hidden', 'true');
    }

    function validatePassword() {
      const password = passwordInput.value;

      if (!password) {
        setFieldError(passwordInput, passwordError, 'パスワードを入力してください。');
        return false;
      }

      if (password.length < 6) {
        setFieldError(passwordInput, passwordError, 'パスワードは6文字以上で入力してください。');
        return false;
      }

      setFieldError(passwordInput, passwordError, '');
      return true;
    }

    passwordToggle.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      passwordToggle.setAttribute('aria-pressed', String(isHidden));
      passwordToggle.setAttribute('aria-label', isHidden ? 'パスワードを隠す' : 'パスワードを表示');
      passwordToggle.textContent = isHidden ? '🙈' : '👁';
      passwordInput.focus();
    });

    forgotPasswordButton.addEventListener('click', openForgotModal);

    document.querySelectorAll('[data-forgot-close]').forEach((button) => {
      button.addEventListener('click', closeForgotModal);
    });

    forgotModal.addEventListener('click', (event) => {
      if (event.target === forgotModal) closeForgotModal();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && forgotModal.classList.contains('open')) {
        closeForgotModal();
      }
    });

    emailInput.addEventListener('input', () => {
      formStatus.classList.remove('show');
      if (emailInput.value.trim()) validateEmail();
    });

    passwordInput.addEventListener('input', () => {
      formStatus.classList.remove('show');
      if (passwordInput.value) validatePassword();
    });

    forgotEmailInput.addEventListener('input', () => {
      forgotStatus.classList.remove('show');
      if (forgotEmailInput.value.trim()) validateForgotEmail();
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      formStatus.classList.remove('show');

      const isEmailValid = validateEmail();
      const isPasswordValid = validatePassword();

      if (!isEmailValid || !isPasswordValid) {
        if (!isEmailValid) {
          emailInput.focus();
        } else {
          passwordInput.focus();
        }
        return;
      }

      const API_BASE = window.JP_TAXI_API_BASE;
      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg =
            typeof data.message === 'string'
              ? data.message
              : Array.isArray(data.message)
                ? data.message.join(', ')
                : 'ログインに失敗しました。';
          formStatus.textContent = msg;
          formStatus.classList.add('show');
          return;
        }
        localStorage.setItem('jp_taxi_token', data.token);
        if (data.user?.customerId != null) {
          localStorage.setItem('customerId', String(data.user.customerId));
        }
        const cid = data.user?.customerId ?? localStorage.getItem('customerId');
        window.location.href = cid
          ? `user_info.html?customerId=${encodeURIComponent(cid)}`
          : 'user_info.html';
      } catch {
        formStatus.textContent = '通信エラーが発生しました。';
        formStatus.classList.add('show');
      }
    });

    forgotForm.addEventListener('submit', (event) => {
      event.preventDefault();
      forgotStatus.classList.remove('show');

      if (!validateForgotEmail()) {
        forgotEmailInput.focus();
        return;
      }

      forgotStatus.textContent = 'メールアドレスが登録されている場合、再設定手順を送信します。';
      forgotStatus.classList.add('show');
    });
  </script>
</body>
</html>
