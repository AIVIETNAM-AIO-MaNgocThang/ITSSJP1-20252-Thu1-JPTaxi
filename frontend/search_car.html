<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JP TAXI - Searching with Correct Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #047857;
      --primary-light: #10b981;
      --bg: #f3f4f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Noto Sans JP", sans-serif;
    }

    body {
      background: var(--bg);
      padding: 20px;
    }

    .window {
      max-width: 1400px;
      margin: 0 auto;
      background: #fff;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      height: 850px;
      position: relative;
    }

    .map-container {
      flex: 1;
      position: relative;
      background: #e5e7eb url("https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1800&q=80") center/cover;
      overflow: hidden;
    }

    .map-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.6) 100%);
      pointer-events: none;
    }

    .taxi-live {
      position: absolute;
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.15);
      z-index: 15;
    }

    .t1 {
      top: 15%;
      left: 25%;
      animation: drive1 12s infinite linear;
    }

    .t2 {
      top: 45%;
      left: 70%;
      animation: drive2 15s infinite linear;
    }

    .t3 {
      top: 70%;
      left: 15%;
      animation: drive3 18s infinite linear;
    }

    @keyframes drive1 {
      0% { transform: translate(0,0) rotate(0deg); }
      50% { transform: translate(20px, 100px) rotate(10deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }

    @keyframes drive2 {
      0% { transform: translate(0,0) rotate(0deg); }
      50% { transform: translate(-150px, 20px) rotate(-5deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }

    @keyframes drive3 {
      0% { transform: translate(0,0) rotate(0deg); }
      50% { transform: translate(100px, -50px) rotate(15deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }

    .radar-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .pulse {
      position: absolute;
      width: 400px;
      height: 400px;
      border: 3px solid var(--primary-light);
      border-radius: 50%;
      animation: ripple 4s infinite cubic-bezier(0, 0.2, 0.8, 1);
      opacity: 0;
    }

    .pulse:nth-child(2) {
      animation-delay: 1.3s;
    }

    .pulse:nth-child(3) {
      animation-delay: 2.6s;
    }

    @keyframes ripple {
      0% { transform: scale(0.2); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    .user-pin {
      width: 70px;
      height: 70px;
      background: var(--primary);
      border: 5px solid white;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(4, 120, 87, 0.4);
      z-index: 20;
    }

    .user-pin span {
      transform: rotate(45deg);
      font-size: 30px;
    }

    .bottom-card {
      position: absolute;
      bottom: 30px;
      left: 30px;
      right: 30px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      z-index: 30;
    }

    .status-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f4f6;
      border-top: 5px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .text-group h2 {
      font-size: 24px;
      font-weight: 800;
      color: #111827;
    }

    .text-group p {
      color: #6b7280;
      font-size: 16px;
      margin-top: 4px;
    }

    .btn-cancel {
      padding: 18px 40px;
      border-radius: 16px;
      border: none;
      background: #f3f4f6;
      font-weight: 700;
      font-size: 16px;
      color: #ef4444;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover {
      background: #fee2e2;
    }

    .nav-bar {
      height: 80px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
    }

    .location {
      font-weight: 600;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .location-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
    }

    @media (max-width: 720px) {
      .window {
        height: 780px;
      }

      .bottom-card {
        align-items: flex-start;
        flex-direction: column;
      }

      .btn-cancel {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="nav-bar">
      <div class="logo"><span>🚕</span> JP TAXI</div>
      <div class="location">
        <div class="location-dot"></div>
        ハノイ・ホアンキエム周辺
      </div>
    </div>

    <div class="map-container">
      <div class="map-overlay"></div>

      <div class="taxi-live t1">🚖</div>
      <div class="taxi-live t2">🚖</div>
      <div class="taxi-live t3">🚖</div>

      <div class="radar-center">
        <div class="pulse"></div>
        <div class="pulse"></div>
        <div class="pulse"></div>
        <div class="user-pin"><span>📍</span></div>
      </div>

      <div class="bottom-card">
        <div class="status-info">
          <div class="spinner"></div>
          <div class="text-group">
            <h2>タクシーを呼び出し中...</h2>
            <p>近くに <strong>3台</strong> の車両が見つかりました。ドライバーの応答を待っています。</p>
          </div>
        </div>

        <button class="btn-cancel">予約をキャンセル</button>
      </div>
    </div>
  </div>
</body>
</html>
