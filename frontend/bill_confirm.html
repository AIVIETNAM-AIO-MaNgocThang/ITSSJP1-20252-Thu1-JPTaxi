<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP TAXI - 予約確認</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="booking-screen">
    <header class="topbar">
      <a class="brand" href="#" aria-label="JP TAXI">
        <span class="brand-icon">🚕</span>
        <span>JP TAXI</span>
      </a>

      <div class="account-menu">
        <button class="profile-button" id="accountButton" type="button" aria-label="プロフィール" aria-expanded="false">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=120&q=80" alt="">
        </button>
        <div class="account-dropdown" id="accountDropdown" aria-hidden="true">
          <button type="button">👤会員情報変更 </button>
          <button type="button">🚪ログアウト</button>
        </div>
      </div>
    </header>

    <section class="booking-layout">
      <section class="confirm-panel" aria-labelledby="page-title">
        <div class="page-heading">
          <h1 id="page-title">予約内容を確認</h1>
          <p>最終確認として上記を確認してください</p>
        </div>

        <section class="section-card">
          <h2>乗車ルート</h2>
          <div class="route-list">
            <div class="route-point pickup">
              <span class="point-dot"></span>
              <div>
                <span>乗車場所</span>
                <strong>ホアンキエム湖</strong>
              </div>
            </div>
            <div class="route-line"></div>
            <div class="route-point destination">
              <span class="point-dot"></span>
              <div>
                <span>目的地</span>
                <strong>ロッテホテル ハノイ</strong>
              </div>
            </div>
          </div>

          <div class="trip-summary">
            <article>
              <span>乗車予定</span>
              <strong>18:30</strong>
            </article>
            <article>
              <span>所要時間</span>
              <strong>12分</strong>
            </article>
            <article>
              <span>走行距離</span>
              <strong>4.8 km</strong>
            </article>
          </div>
        </section>

        <section class="section-card">
          <h2>車種</h2>
          <div class="vehicle-card">
            <span class="vehicle-icon">🚕</span>
            <div>
              <strong>スタンダード</strong>
              <span>快適なセダン・標準車</span>
            </div>
            <strong class="vehicle-price">¥680</strong>
          </div>
        </section>

        <section class="section-card">
          <label class="memo-field">
            <span>ドライバーへのメモ（任意）</span>
            <textarea placeholder="例：大きな荷物があります。または待ち合わせ場所の詳細など..."></textarea>
          </label>
        </section>

        <section class="section-card fare-card">
          <h2>料金詳細</h2>
          <dl>
            <div>
              <dt>基本料金</dt>
              <dd>¥500</dd>
            </div>
            <div>
              <dt>距離加算</dt>
              <dd>¥120</dd>
            </div>
            <div>
              <dt>予約手数料</dt>
              <dd>¥60</dd>
            </div>
          </dl>
          <div class="total-row">
            <span>合計金額</span>
            <strong>¥680</strong>
          </div>
        </section>

        <div class="booking-mode" role="group" aria-label="予約タイプ">
          <button class="mode-button active" type="button" data-mode="self">自分用</button>
          <button class="mode-button" type="button" data-mode="proxy">代理予約</button>
        </div>

        <div class="action-row">
          <button class="secondary-button" type="button">戻る</button>
          <button class="primary-button" id="confirmBooking" type="button">予約を確定する</button>
        </div>
      </section>

      <section class="map-panel" aria-label="ルートマップ">
        <div class="map-label pickup-label">ホアンキエム湖</div>
        <div class="map-label destination-label">ロッテホテル</div>
        <svg class="route-svg" viewBox="0 0 420 760" preserveAspectRatio="none" aria-hidden="true">
          <path d="M142 230 C260 342 292 452 264 612" />
        </svg>
        <span class="map-pin pickup-pin"></span>
        <span class="map-pin destination-pin"></span>
      </section>
    </section>
  </main>

  <div class="modal-backdrop" id="proxyModal" aria-hidden="true">
    <section class="proxy-modal" role="dialog" aria-modal="true" aria-labelledby="proxy-title">
      <div class="proxy-fields">
        <label>
          <span>乗車者氏名</span>
          <input type="text" placeholder="例: 田中 太郎">
        </label>
        <label>
          <span>連絡先電話番号</span>
          <input type="tel" placeholder="090-0000-0000">
        </label>
      </div>

      <div class="modal-actions">
        <button class="secondary-button" type="button" data-modal-close>戻る</button>
        <button class="primary-button" type="button">予約を確定する</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">予約内容を確認しました</div>

  <script>
    const modeButtons = document.querySelectorAll('.confirm-panel .mode-button');
    const confirmButton = document.getElementById('confirmBooking');
    const modal = document.getElementById('proxyModal');
    const toast = document.getElementById('toast');
    const accountButton = document.getElementById('accountButton');
    const accountDropdown = document.getElementById('accountDropdown');
    let bookingMode = 'self';

    modeButtons.forEach((button) => {
      button.addEventListener('click', () => {
        bookingMode = button.dataset.mode;
        modeButtons.forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
      });
    });

    confirmButton.addEventListener('click', () => {
      if (bookingMode === 'proxy') {
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
        return;
      }

      toast.classList.add('show');
      window.setTimeout(() => toast.classList.remove('show'), 1800);
    });

    document.querySelectorAll('[data-modal-close]').forEach((button) => {
      button.addEventListener('click', () => {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
      });
    });

    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
      }
    });

    accountButton.addEventListener('click', (event) => {
      event.stopPropagation();
      const isOpen = accountDropdown.classList.toggle('open');
      accountDropdown.setAttribute('aria-hidden', String(!isOpen));
      accountButton.setAttribute('aria-expanded', String(isOpen));
    });

    document.addEventListener('click', (event) => {
      if (!accountDropdown.contains(event.target) && event.target !== accountButton) {
        accountDropdown.classList.remove('open');
        accountDropdown.setAttribute('aria-hidden', 'true');
        accountButton.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
