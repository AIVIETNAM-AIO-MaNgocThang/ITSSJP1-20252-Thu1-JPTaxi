<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP TAXI - 新規登録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <main class="register-screen">
    <header class="topbar">
      <a class="brand" href="#" aria-label="JP TAXI">
        <span class="brand-icon">🚕</span>
        <span>JP TAXI</span>
      </a>
    </header>

    <section class="register-layout">
      <div class="intro">
        <div class="hero-copy">
          <span class="eyebrow">✨ 新規アカウント作成</span>
          <h1>JP TAXIをはじめましょう</h1>
          <p>新しいアカウントを作成すると、日本語対応のタクシー予約、履歴確認、メッセージ機能などをご利用いただけます。</p>
        </div>

        <div class="benefits" aria-label="サービスの特徴">
          <article>
            <h2>簡単登録</h2>
            <p>必要情報を入力するだけで、すぐにアカウントを作成できます。</p>
          </article>
          <article>
            <h2>予約管理</h2>
            <p>配車予約から履歴の確認まで、一つのアカウントでまとめて管理できます。</p>
          </article>
          <article>
            <h2>安心の利用</h2>
            <p>日本語対応の画面とサポートで、初めてでも安心して利用できます。</p>
          </article>
        </div>
      </div>

      <section class="register-card" aria-labelledby="register-title">
        <div class="form-logo" aria-hidden="true">🚕</div>
        <div class="form-heading">
          <h2 id="register-title">顧客登録</h2>
          <p>必要情報を入力して、新しいアカウントを作成してください。</p>
        </div>

        <form>
          <div class="field-grid two">
            <label>
              <span>姓</span>
              <input type="text" placeholder="姓を入力">
            </label>
            <label>
              <span>名</span>
              <input type="text" placeholder="名を入力">
            </label>
          </div>

          <label>
            <span>メールアドレス</span>
            <input type="email" placeholder="example@email.com">
          </label>

          <div class="field-grid two">
            <label>
              <span>電話番号</span>
              <input type="tel" placeholder="電話番号を入力">
            </label>
            <label>
              <span>性別</span>
              <select>
                <option value="" selected disabled>選択してください</option>
                <option>男性</option>
                <option>女性</option>
                <option>その他</option>
              </select>
            </label>
          </div>

          <div class="field-grid two">
            <label>
              <span>パスワード</span>
              <input type="password" placeholder="パスワードを入力">
            </label>
            <label>
              <span>パスワード確認</span>
              <input type="password" placeholder="もう一度入力">
            </label>
          </div>

          <label class="terms">
            <input type="checkbox">
            <span>利用規約およびプライバシーポリシーに同意します</span>
          </label>

          <button class="submit-button" type="submit">登録</button>

          <p class="login-note">すでにアカウントをお持ちですか？ <a href="#">ログイン</a></p>
        </form>
      </section>
    </section>
  </main>
  <script src="js/api.js" defer></script>
</body>
</html>
