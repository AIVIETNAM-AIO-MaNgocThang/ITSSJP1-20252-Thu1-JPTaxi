<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP TAXI - 新規登録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <main class="register-screen">
    <header class="topbar">
      <a class="brand" href="login.html" aria-label="JP TAXI">
        <span class="brand-icon">🚕</span>
        <span>JP TAXI</span>
      </a>
    </header>

    <section class="register-layout">
      <div class="intro">
        <div class="hero-copy">
          <span class="eyebrow">✨ 新規アカウント作成</span>
          <h1>JP TAXIをはじめましょう</h1>
          <p>新しいアカウントを作成すると、日本語対応のタクシー予約、履歴確認、メッセージ機能などをご利用いただけます。</p>
        </div>

        <div class="benefits" aria-label="サービスの特徴">
          <article>
            <h2>簡単登録</h2>
            <p>必要情報を入力するだけで、すぐにアカウントを作成できます。</p>
          </article>
          <article>
            <h2>予約管理</h2>
            <p>配車予約から履歴の確認まで、一つのアカウントでまとめて管理できます。</p>
          </article>
          <article>
            <h2>安心の利用</h2>
            <p>日本語対応の画面とサポートで、初めてでも安心して利用できます。</p>
          </article>
        </div>
      </div>

      <section class="register-card" aria-labelledby="register-title">
        <div class="form-logo" aria-hidden="true">🚕</div>
        <div class="form-heading">
          <h2 id="register-title">顧客登録</h2>
          <p>必要情報を入力して、新しいアカウントを作成してください。</p>
        </div>

        <form id="registerForm" novalidate>
          <div class="field-grid two">
            <label>
              <span>姓</span>
              <input id="lastNameInput" name="last_name" type="text" placeholder="姓を入力" required>
            </label>
            <label>
              <span>名</span>
              <input id="firstNameInput" name="first_name" type="text" placeholder="名を入力" required>
            </label>
          </div>

          <label>
            <span>メールアドレス</span>
            <input id="emailInput" name="email" type="email" placeholder="example@email.com" required autocomplete="email">
          </label>

          <div class="field-grid two">
            <label>
              <span>電話番号</span>
              <input id="phoneInput" name="phone" type="tel" placeholder="電話番号を入力" required>
            </label>
            <label>
              <span>性別</span>
              <select id="genderSelect" name="gender" required>
                <option value="" selected disabled>選択してください</option>
                <option value="Male">男性</option>
                <option value="Female">女性</option>
                <option value="Other">その他</option>
              </select>
            </label>
          </div>

          <div class="field-grid two">
            <label>
              <span>パスワード</span>
              <input id="passwordInput" name="password" type="password" placeholder="パスワードを入力" required minlength="6" autocomplete="new-password">
            </label>
            <label>
              <span>パスワード確認</span>
              <input id="passwordConfirmInput" type="password" placeholder="もう一度入力" required minlength="6" autocomplete="new-password">
            </label>
          </div>

          <label class="terms">
            <input id="termsCheckbox" type="checkbox" required>
            <span>利用規約およびプライバシーポリシーに同意します</span>
          </label>

          <div class="form-status" id="registerStatus" role="status" aria-live="polite"></div>

          <button class="submit-button" type="submit">登録</button>

          <p class="login-note">すでにアカウントをお持ちですか？ <a href="login.html">ログイン</a></p>
        </form>
      </section>
    </section>
  </main>

  <script src="js/api-config.js"></script>
  <script>
    const registerForm = document.getElementById('registerForm');
    const registerStatus = document.getElementById('registerStatus');

    registerForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      registerStatus.textContent = '';

      const lastName = document.getElementById('lastNameInput').value.trim();
      const firstName = document.getElementById('firstNameInput').value.trim();
      const email = document.getElementById('emailInput').value.trim();
      const phone = document.getElementById('phoneInput').value.trim();
      const gender = document.getElementById('genderSelect').value;
      const password = document.getElementById('passwordInput').value;
      const password2 = document.getElementById('passwordConfirmInput').value;
      const terms = document.getElementById('termsCheckbox').checked;

      if (!terms) {
        registerStatus.textContent = '利用規約に同意してください。';
        return;
      }
      if (password !== password2) {
        registerStatus.textContent = 'パスワードが一致しません。';
        return;
      }

      const API_BASE = window.JP_TAXI_API_BASE;
      try {
        const res = await fetch(`${API_BASE}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            first_name: firstName,
            last_name: lastName,
            email,
            password,
            phone,
            gender: gender || undefined,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg =
            typeof data.message === 'string'
              ? data.message
              : Array.isArray(data.message)
                ? data.message.join(', ')
                : '登録に失敗しました。';
          registerStatus.textContent = msg;
          return;
        }
        registerStatus.textContent = '登録が完了しました。ログインへ移動します…';
        window.setTimeout(() => {
          window.location.href = 'login.html';
        }, 800);
      } catch {
        registerStatus.textContent = '通信エラーが発生しました。';
      }
    });
  </script>
</body>
</html>
