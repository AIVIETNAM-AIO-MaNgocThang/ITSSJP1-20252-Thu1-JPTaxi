<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP TAXI - Driver Available</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .driver-available-page,
    .driver-available-page * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: #12201b;
      background: #ece6d8;
    }

    .driver-available-page {
      --brand: #009b78;
      --brand-dark: #007c63;
      --danger: #fa4c67;
      --ink: #13231f;
      --muted: #60726c;
      --line: #dde6e1;
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(239, 232, 213, 0.24), rgba(239, 232, 213, 0.24)),
        url("https://upload.wikimedia.org/wikipedia/commons/8/83/Equirectangular_projection_SW.jpg") center / cover no-repeat;
    }

    .driver-available-page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 56% 55%, rgba(255, 70, 101, 0.22), transparent 10%),
        radial-gradient(circle at 50% 48%, rgba(255, 112, 92, 0.16), transparent 16%),
        linear-gradient(90deg, rgba(255, 255, 255, 0.34), transparent 30%, transparent 72%, rgba(227, 198, 126, 0.16));
      pointer-events: none;
    }

    .driver-available-page::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(0, 0, 0, 0.12) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.22;
      pointer-events: none;
    }

    .available-header {
      position: relative;
      z-index: 5;
      height: 74px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid rgba(210, 217, 213, 0.86);
      box-shadow: 0 8px 24px rgba(20, 28, 25, 0.06);
    }

    .available-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--brand);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
      text-decoration: none;
      white-space: nowrap;
    }

    .available-brand__icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--brand);
      border-radius: 10px;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.12);
    }

    .available-brand__icon svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .map-pin {
      position: absolute;
      z-index: 4;
      left: 57%;
      top: 57%;
      width: 24px;
      height: 24px;
      border: 4px solid #fff;
      border-radius: 50% 50% 50% 0;
      background: var(--danger);
      box-shadow: 0 12px 24px rgba(174, 27, 53, 0.35);
      transform: rotate(-45deg);
    }

    .map-pin::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%);
    }

    .driver-card {
      position: absolute;
      z-index: 6;
      left: 40px;
      bottom: 38px;
      width: min(430px, calc(100vw - 32px));
      padding: 18px;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(219, 228, 224, 0.98);
      border-radius: 14px;
      box-shadow: 0 22px 56px rgba(20, 28, 25, 0.18);
      backdrop-filter: blur(12px);
    }

    .arrival-card {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      padding: 0 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .arrival-label {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .arrival-time {
      margin: 0;
      color: var(--brand);
      font-size: clamp(36px, 5.5vw, 48px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0;
    }

    .arrival-time span {
      font-size: 0.72em;
      margin-left: 4px;
    }

    .arrival-distance {
      color: var(--brand-dark);
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    .driver-row {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
      padding: 16px 0;
    }

    .driver-avatar {
      width: 58px;
      height: 58px;
      overflow: hidden;
      border: 3px solid #fff;
      border-radius: 50%;
      background: linear-gradient(135deg, #d5e9ee, #9ab4bd);
      box-shadow: 0 8px 18px rgba(19, 35, 31, 0.16);
    }

    .driver-avatar svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .driver-name {
      margin: 0 0 5px;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.3;
      font-weight: 900;
    }

    .driver-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .plate {
      display: inline-flex;
      align-items: center;
      height: 24px;
      margin-top: 7px;
      padding: 0 12px;
      color: #fff;
      background: #1e2530;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0.08);
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action-button {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: 7px;
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .action-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
    }

    .action-button--call {
      color: #fff;
      background: var(--brand);
    }

    .action-button--call:hover {
      background: var(--brand-dark);
    }

    .action-button--message {
      color: var(--brand-dark);
      background: #fff;
      border-color: var(--line);
    }

    .action-button svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .map-cluster {
      position: absolute;
      z-index: 3;
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      color: #fff;
      background: #2d8bd4;
      border: 2px solid #fff;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(8, 44, 74, 0.28);
    }

    .map-cluster--one { left: 64%; top: 60%; background: #f4a024; }
    .map-cluster--two { left: 36%; top: 41%; }
    .map-cluster--three { left: 73%; top: 37%; background: #be4bdb; }
    .map-cluster--four { left: 48%; top: 31%; background: #e05656; }

    @media (max-width: 720px) {
      .available-header {
        height: 64px;
        padding: 0 18px;
      }

      .available-brand {
        font-size: 18px;
      }

      .available-brand__icon {
        width: 34px;
        height: 34px;
      }

      .driver-card {
        left: 16px;
        right: 16px;
        bottom: 16px;
        width: auto;
        padding: 15px;
      }

      .arrival-card {
        align-items: flex-start;
      }

      .map-pin {
        left: 63%;
        top: 42%;
      }
    }

    @media (max-width: 440px) {
      .card-actions {
        grid-template-columns: 1fr;
      }

      .arrival-card {
        display: block;
      }

      .arrival-distance {
        display: inline-block;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="driver-available-page" aria-label="JP TAXI driver available screen">
    <header class="available-header">
      <a class="available-brand" href="#" aria-label="JP TAXI">
        <span class="available-brand__icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <path fill="currentColor" d="M8.6 11.2h14.8l2.7 6.3h1.3c.8 0 1.5.7 1.5 1.5v4.1h-3.2a3.2 3.2 0 0 1-6.3 0h-6.8a3.2 3.2 0 0 1-6.3 0H3.1V19c0-.8.7-1.5 1.5-1.5h1.3l2.7-6.3Zm1.6 2.4-1.7 3.9h15l-1.7-3.9H10.2Zm-1 10.7a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Zm13.3 0a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Z"/>
          </svg>
        </span>
        JP TAXI
      </a>
    </header>

    <span class="map-cluster map-cluster--one">2</span>
    <span class="map-cluster map-cluster--two">5</span>
    <span class="map-cluster map-cluster--three">3</span>
    <span class="map-cluster map-cluster--four">1</span>
    <span class="map-pin" aria-label="Driver location"></span>

    <section class="driver-card" aria-label="Driver information">
      <div class="arrival-card">
        <div>
          <p class="arrival-label">お迎え予定時間</p>
          <p class="arrival-time">あと 3 <span>分</span></p>
        </div>
        <span class="arrival-distance">0.8 km</span>
      </div>

      <div class="driver-row">
        <div class="driver-avatar" aria-hidden="true">
          <svg viewBox="0 0 80 80">
            <rect width="80" height="80" fill="#bfd6dc"/>
            <circle cx="40" cy="30" r="16" fill="#243447"/>
            <path d="M18 75c2.8-18 14-27 22-27s19.2 9 22 27H18Z" fill="#17212f"/>
            <circle cx="40" cy="34" r="13" fill="#f0c2a6"/>
            <path d="M24 29c2-13 10-19 21-17 7 1.3 12 6.5 12 14-8-3-17-4-33 3Z" fill="#17212f"/>
            <path d="M30 39c4 5 15 5 20 0" fill="none" stroke="#904f46" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <p class="driver-name">田中 ドライバー</p>
          <p class="driver-meta">トヨタ・クラウン / ホワイト</p>
          <span class="plate">30A-123.45</span>
        </div>
      </div>

      <div class="card-actions">
        <button class="action-button action-button--call" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M6.6 10.8c1.6 3.1 3.5 5 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.6.6 4 .6.7 0 1.2.5 1.2 1.2v3.5c0 .7-.5 1.2-1.2 1.2C10.6 21.4 2.6 13.4 2.6 3.4c0-.7.5-1.2 1.2-1.2h3.5c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.7.6 4 .1.4 0 .9-.3 1.2l-2.2 2.2Z"/>
          </svg>
          電話する
        </button>
        <button class="action-button action-button--message" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M4.5 5h15A2.5 2.5 0 0 1 22 7.5v9A2.5 2.5 0 0 1 19.5 19h-15A2.5 2.5 0 0 1 2 16.5v-9A2.5 2.5 0 0 1 4.5 5Zm.3 2 7.2 5.1L19.2 7H4.8Zm15.2 2.1-7.4 5.2a1 1 0 0 1-1.2 0L4 9.1v7.4c0 .3.2.5.5.5h15c.3 0 .5-.2.5-.5V9.1Z"/>
          </svg>
          メッセージ
        </button>
      </div>
    </section>
  </main>
</body>
</html>
