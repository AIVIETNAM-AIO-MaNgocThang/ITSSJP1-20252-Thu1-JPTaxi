# JP Taxi backend — PostgreSQL local (database: jptaxi).
#
# Nếu log báo: FATAL: password authentication failed (28P01)
#   → Mật khẩu không khớp user postgres trên máy bạn. Sửa mật khẩu trong PostgreSQL
#     cho trùng default bên dưới, HOẶC: export SPRING_DATASOURCE_PASSWORD='đúng_mật_khẩu'
# Nếu biến SPRING_DATASOURCE_PASSWORD đã được export (kể cả rỗng), Spring ưu tiên biến môi trường:
#   unset SPRING_DATASOURCE_PASSWORD   # để dùng default trong file này
#
# Nếu log báo: FATAL: database "jptaxi" does not exist (SQLState 3D000)
#   → Chưa tạo database trên PostgreSQL. Chạy: ./database/create-jptaxi-database.sh
#   (Docker: backend/docker-compose.yml đã POSTGRES_DB=jptaxi — volume cũ có thể thiếu DB;
#    thử: docker compose -f backend/docker-compose.yml down -v && docker compose -f backend/docker-compose.yml up -d)
#
# Lỗi "Unable to determine Dialect" thường là hệ quả của lỗi kết nối ở trên (sửa DB/auth trước).

spring:
  application:
    name: jptaxi-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/JPTaxi}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
